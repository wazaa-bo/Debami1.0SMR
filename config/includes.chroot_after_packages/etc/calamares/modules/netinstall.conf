---
groupsUrl: local
required: false

label:
    sidebar: "Seleccionar paquetes"
    title: "Elige los componentes a instalar"

groups:

  - name: "Navegadores web"
    description: "Navegadores de internet"
    hidden: false
    selected: false
    critical: false
    expanded: true
    packages: []
    subgroups:

      - name: "Falkon"
        description: "Navegador ligero basado en Qt/WebEngine"
        selected: true
        packages:
          - falkon

      - name: "Firefox ESR"
        description: "Navegador de código abierto desarrollado por Mozilla"
        selected: false
        packages:
          - firefox-esr

      - name: "Chromium"
        description: "Navegador de código abierto desarrollado por Google"
        selected: false
        packages:
          - chromium

      - name: "Brave"
        description: "Navegador con bloqueador de anuncios integrado, basado en Chromium"
        selected: false
        pre-install: "bash -c 'curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg && echo \"deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg arch=amd64] https://brave-browser-apt-release.s3.brave.com/ stable main\" > /etc/apt/sources.list.d/brave-browser-release.list && apt-get update -qq'"
        packages:
          - brave-browser

      - name: "LibreWolf"
        description: "Fork de Firefox enfocado en privacidad y seguridad"
        selected: false
        pre-install: "bash -c 'curl -fsSLo /usr/share/keyrings/librewolf-keyring.gpg https://deb.librewolf.net/keyring.gpg && echo \"deb [arch=amd64 signed-by=/usr/share/keyrings/librewolf-keyring.gpg] https://deb.librewolf.net $(grep VERSION_CODENAME /etc/os-release | cut -d= -f2) main\" > /etc/apt/sources.list.d/librewolf.list && apt-get update -qq'"
        packages:
          - librewolf

      - name: "Tor Browser"
        description: "Navegación anónima a través de la red Tor"
        selected: false
        packages:
          - torbrowser-launcher


  - name: "Ofimática"
    description: "Suites y herramientas de oficina"
    hidden: false
    selected: false
    critical: false
    expanded: false
    packages: []
    subgroups:

      - name: "LibreOffice completo"
        description: "Suite completa: Writer, Calc, Impress, Draw, Base, Math"
        selected: false
        packages:
          - libreoffice
          - libreoffice-l10n-es
          - libreoffice-help-es

      - name: "LibreOffice básico"
        description: "Solo Writer (texto), Calc (hoja de cálculo) e Impress (presentaciones)"
        selected: false
        packages:
          - libreoffice-writer
          - libreoffice-calc
          - libreoffice-impress

      - name: "OnlyOffice"
        description: "Suite compatible con formatos Microsoft Office"
        selected: false
        pre-install: "bash -c 'curl -fsSLo /usr/share/keyrings/onlyoffice-keyring.gpg https://download.onlyoffice.com/repo/debian/onlyoffice.gpg && echo \"deb [signed-by=/usr/share/keyrings/onlyoffice-keyring.gpg] https://download.onlyoffice.com/repo/debian squeeze main\" > /etc/apt/sources.list.d/onlyoffice.list && apt-get update -qq'"
        packages:
          - onlyoffice-desktopeditors

      - name: "Visores de documentos"
        description: "Visores de PDF y otros formatos"
        selected: true
        packages:
          - name: okular
            description: "Visor completo (PDF, EPUB, CBZ...)"
          - name: evince
            description: "Visor ligero alternativo"

      - name: "Thunderbird"
        description: "Cliente de correo electrónico de Mozilla"
        selected: false
        packages:
          - thunderbird
          - thunderbird-l10n-es-es


